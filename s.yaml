edition: 3.0.0
name: whattime-dashboard
access: default

vars:
  region: cn-hangzhou

resources:
  whattime:
    component: fc3
    props:
      region: ${vars.region}
      service:
        name: whattime-dashboard
      function:
        name: web
        description: multi-source-time-dashboard
        runtime: custom.debian10
        timeout: 60
        memorySize: 512
        code: ./
        customRuntimeConfig:
          command:
            - npm run start
          port: 9000
        environmentVariables:
          PORT: '9000'
          STATIC_DIR: dist/client
          TIME_CACHE_TTL_MS: '1000'
          TIME_REQUEST_TIMEOUT_MS: '1200'
          TZ: Asia/Shanghai
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
